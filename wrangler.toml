name = "task-logger"
main = "worker/src/index.js"
compatibility_date = "2024-04-01"

[assets]
directory = "./frontend/dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "task-logger-db"
database_id = "REPLACE_WITH_REAL_D1_ID"

[vars]
AUTH_TOKEN = "change-me-to-a-secret-token"
